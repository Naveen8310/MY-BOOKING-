{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Venue | EventBooker{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0"><i class="fas fa-edit"></i> Edit Venue: {{ venue.name }}</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Venue Name *</label>
                                <input type="text" name="name" value="{{ venue.name }}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Venue Type *</label>
                                <select name="venue_type" class="form-select" required>
                                    <option value="wedding_hall" {% if venue.venue_type == 'wedding_hall' %}selected{% endif %}>Wedding Hall</option>
                                    <option value="conference_room" {% if venue.venue_type == 'conference_room' %}selected{% endif %}>Conference Room</option>
                                    <option value="dining_table" {% if venue.venue_type == 'dining_table' %}selected{% endif %}>Dining Table</option>
                                    <option value="fest" {% if venue.venue_type == 'fest' %}selected{% endif %}>College Fest</option>
                                    <option value="vip_table" {% if venue.venue_type == 'vip_table' %}selected{% endif %}>VIP Table</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Capacity *</label>
                                <input type="number" name="capacity" value="{{ venue.capacity }}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Location *</label>
                                <input type="text" name="location" value="{{ venue.location }}" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea name="description" rows="4" class="form-control">{{ venue.description }}</textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Price per hour (₹) *</label>
                                <input type="number" step="0.01" name="price_per_hour" value="{{ venue.price_per_hour }}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Status</label>
                                <div class="form-check mt-2">
                                    <input type="checkbox" name="is_available" class="form-check-input" {% if venue.is_available %}checked{% endif %}>
                                    <label class="form-check-label">Available for booking</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Current Image</label>
                                {% if venue.image %}
                                <div class="mb-2">
                                    <img src="{{ venue.image.url }}" width="150" class="img-thumbnail">
                                </div>
                                {% endif %}
                                <input type="file" name="image" class="form-control" accept="image/*">
                                <small class="text-muted">Leave empty to keep current image.</small>
                            </div>
                        </div>
                        <div class="mt-4 d-flex justify-content-between">
                            <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
