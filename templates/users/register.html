{% extends 'base.html' %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <h2 class="text-center">
            <i class="fas fa-user-plus me-2"></i>Create Your Account
        </h2>
        
        <form method="post" novalidate>
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-user me-1"></i>Full Name *
                </label>
                <input type="text" name="name" class="form-control" 
                       placeholder="Enter your full name" 
                       value="{{ form_data.name|default:'' }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-envelope me-1"></i>Email Address *
                </label>
                <input type="email" name="email" class="form-control" 
                       placeholder="Enter your email"
                       value="{{ form_data.email|default:'' }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-phone me-1"></i>Phone Number (Optional)
                </label>
                <input type="text" name="phone" class="form-control" 
                       placeholder="Enter your phone number"
                       value="{{ form_data.phone|default:'' }}">
            </div>
            
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-lock me-1"></i>Password *
                </label>
                <input type="password" name="password" class="form-control" 
                       placeholder="Min 8 characters" required minlength="8">
            </div>
            
            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-lock me-1"></i>Confirm Password *
                </label>
                <input type="password" name="confirm_password" class="form-control" 
                       placeholder="Re-enter your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-user-plus me-2"></i>Register
            </button>
        </form>
        
        <div class="text-center mt-3 text-white">
            <p>Already have an account? 
                <a href="{% url 'login' %}" class="text-warning fw-bold">Login Here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
